<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブラウザ現在地テスト</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 860px; margin: 40px auto; padding: 0 16px; line-height: 1.7; color: #222; }
      .card { border: 1px solid #ddd; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
      button { background: #39b22f; color: #fff; border: none; border-radius: 12px; padding: 14px 18px; font-size: 16px; cursor: pointer; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #f6f6f6; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
      .ok { color: #0a7f2e; font-weight: bold; }
      .err { color: #c5221f; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>1. ブラウザ現在地テスト 📍</h1>
    <div class="card">
      <button id="getBtn">現在地を取得する</button>
    </div>
    <div class="card">
      <h2>結果</h2>
      <div id="status">まだ実行していません</div>
      <div id="result" class="mono"></div>
    </div>
    <script>
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      document.getElementById('getBtn').addEventListener('click', () => {
        if (!navigator.geolocation) {
          statusEl.innerHTML = '<span class="err">このブラウザは位置情報に対応していません</span>';
          return;
        }
        statusEl.textContent = '現在地を取得中...';
        resultEl.textContent = '';

        navigator.geolocation.getCurrentPosition(async (position) => {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;
          const response = await fetch('/api/location/echo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ latitude, longitude })
          });
          const data = await response.json();
          if (!response.ok) {
            statusEl.innerHTML = '<span class="err">エラー</span>';
            resultEl.textContent = data.error || data.detail || '取得に失敗しました';
            return;
          }
          statusEl.innerHTML = '<span class="ok">取得成功</span>';
          resultEl.textContent = JSON.stringify(data, null, 2);
        }, (error) => {
          statusEl.innerHTML = '<span class="err">位置情報を取得できませんでした</span>';
          resultEl.textContent = error.message;
        }, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        });
      });
    </script>
  </body>
</html>
