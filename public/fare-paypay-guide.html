<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ヒモティー | ヒモを呼ぶ</title>
  <style>
    :root {
      --bg-1: #f2f8ee;
      --bg-2: #fbfdf9;
      --shell: rgba(255,255,255,.78);
      --shell-line: rgba(221,233,214,.95);
      --text: #111111;
      --line: #dbe9d4;
      --teal-1: #f6fbf9;
      --teal-2: #eaf7f3;
      --teal-3: #d7efe6;
      --shadow-shell: 0 22px 50px rgba(96, 118, 82, 0.12);
      --shadow-card: 0 16px 34px rgba(103, 123, 89, 0.08);
      --radius-shell: 38px;
      --radius-pill: 999px;
      --paypay: #ff2344;
      --maxw: 430px;
      --danger-bg: #fff4f2;
      --danger-line: #f0ccc6;
      --danger-text: #8e4f45;
      --success-bg: #f3fbef;
      --success-line: #d8eac9;
      --success-text: #4d6d47;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      color: var(--text);
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, var(--bg-1) 0%, #f7fbf4 35%, var(--bg-2) 100%);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 14px 34px;
    }

    .phone {
      width: 100%;
      max-width: var(--maxw);
    }

    .app {
      position: relative;
      background: var(--shell);
      border: 1px solid var(--shell-line);
      border-radius: var(--radius-shell);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-shell);
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: -50px auto auto -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(224, 239, 210, 0.72) 0%, rgba(224, 239, 210, 0) 72%);
      pointer-events: none;
    }

    .app::after {
      content: "";
      position: absolute;
      inset: auto -80px -70px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(213, 235, 222, 0.55) 0%, rgba(213, 235, 222, 0) 72%);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 18px 10px 1px;
      background: rgba(255, 255, 255, 0.98);
    }

    .brand__logo {
      width: 100px;
      object-fit: contain;
      display: block;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 6px 18px 24px;
    }

    .intro {
      text-align: center;
      padding: 6px 2px 14px;
    }

    .intro__title {
      margin: 0;
      font-size: 31px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: .02em;
    }

    .error-box,
    .success-box {
      display: none;
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.6;
      font-weight: 700;
    }

    .error-box {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: var(--danger-text);
    }

    .success-box {
      background: var(--success-bg);
      border: 1px solid var(--success-line);
      color: var(--success-text);
    }

    .summary {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
      margin-top: 14px;
    }

    .fare-pill-wrap {
      display: flex;
      justify-content: center;
    }

    .fare-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 11px 18px;
      border-radius: var(--radius-pill);
      background: linear-gradient(180deg, #ffffff 0%, #f4faef 100%);
      border: 1px solid var(--line);
      box-shadow: 0 12px 22px rgba(104, 123, 92, 0.08);
      font-weight: 900;
    }

    .fare-pill__small {
      color: #667161;
      font-size: 12px;
      font-weight: 800;
    }

    .fare-pill__amount {
      font-size: 17px;
      letter-spacing: .01em;
    }

    .visual-card {
      position: relative;
      overflow: hidden;
      min-height: 166px;
      border-radius: 28px;
      border: 1px solid rgba(214, 233, 224, 0.95);
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.92) 0%, rgba(255,255,255,0) 28%),
        radial-gradient(circle at 82% 18%, rgba(217,240,231,.55) 0%, rgba(217,240,231,0) 35%),
        linear-gradient(180deg, var(--teal-1) 0%, var(--teal-2) 55%, var(--teal-3) 100%);
      box-shadow: var(--shadow-card);
      padding: 0 14px 18px;
    }

    .route-scene {
      position: relative;
      height: 186px;
    }

    .route-scene__line {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 54%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #8fc46d 0%, #7bb15f 100%);
      transform: rotate(-12deg);
      box-shadow: 0 3px 10px rgba(116, 165, 88, 0.16);
    }

    .route-scene__line::before,
    .route-scene__line::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 16px;
      height: 16px;
      margin-top: -8px;
      border-radius: 50%;
      background: #ffffff;
      border: 4px solid #7fb666;
      box-shadow: 0 4px 12px rgba(113, 145, 91, 0.10);
    }

    .route-scene__line::before { left: -8px; }
    .route-scene__line::after { right: -8px; }

    .route-scene__mascot {
      position: absolute;
      left: 50%;
      top: 40.5%;
      width: 69px;
      object-fit: contain;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 12px 18px rgba(85, 105, 71, 0.14));
      z-index: 3;
    }

    .route-scene__station-tag {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding: 8px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(217,233,224,.96);
      box-shadow: 0 8px 16px rgba(109, 126, 95, 0.06);
      backdrop-filter: blur(8px);
      z-index: 4;
      max-width: 46%;
    }

    .route-scene__station-tag::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #84be67;
      box-shadow: 0 0 0 3px rgba(132,190,103,.12);
    }

    .route-scene__station-tag--left { left: 0; bottom: -8px; }
    .route-scene__station-tag--right { right: 0; top: 18px; }

    .route-scene__station-label {
      padding-left: 16px;
      font-size: 11px;
      line-height: 1.35;
      color: #688063;
      font-weight: 800;
    }

    .route-scene__station-name {
      font-size: 17px;
      line-height: 1.25;
      font-weight: 900;
      word-break: break-word;
    }

    .status-mini {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(217,233,224,.96);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 700;
      text-align: center;
      color: #5f6d59;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      justify-items: center;
    }

    .cta {
      width: 100%;
      min-height: 58px;
      border: 1.5px solid #74c964;
      border-radius: var(--radius-pill);
      background: linear-gradient(180deg, #8fff80 0%, #7dd467 100%);
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 14px 26px rgba(104, 123, 89, 0.08);
      cursor: pointer;
      transition: opacity .15s ease, transform .1s ease;
    }

    .cta[disabled] {
      opacity: .62;
      cursor: wait;
    }

    .cta:active { transform: translateY(1px); }

    .paypay-icon {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      background: var(--paypay);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 8px 14px rgba(255, 35, 68, 0.18);
      flex: none;
    }

    .footer-note {
      max-width: 320px;
      text-align: center;
      font-size: 15px;
      line-height: 1.75;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .secondary-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .subbtn {
      appearance: none;
      border: 1px solid #d8e6d0;
      background: rgba(255,255,255,.9);
      color: #5d6d58;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .is-loading .fare-pill__amount,
    .is-loading .route-scene__station-name,
    .is-loading .status-mini {
      opacity: .55;
    }

    @media (max-width: 390px) {
      .content { padding-left: 16px; padding-right: 16px; }
      .intro__title { font-size: 28px; }
      .visual-card { min-height: 160px; }
      .route-scene { height: 182px; }
      .route-scene__mascot { width: 66px; }
      .route-scene__station-name { font-size: 15px; }
      .cta { min-height: 56px; font-size: 16px; }
    }
  </style>
  <script>
    window.HIMOTY_LIFF_ID = '2009702150-jvuDybmk';
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="phone">
    <div class="app" id="appRoot">
      <header class="header">
        <img class="brand__logo" id="brandLogo" src="./himoty_logo.jpg" alt="ヒモティ" />
      </header>

      <main class="content">
        <div class="error-box" id="errorBox"></div>
        <div class="success-box" id="successBox"></div>

        <section class="intro">
          <h1 class="intro__title">今すぐヒモを呼ぶ</h1>
        </section>

        <section class="visual-card" aria-label="ヒモ移動イメージ">
          <div class="route-scene">
            <div class="route-scene__line"></div>
            <img id="routeMascot" class="route-scene__mascot" src="./himoty_train.jpg" alt="移動中のヒモキャラクター" />

            <div class="route-scene__station-tag route-scene__station-tag--left">
              <span class="route-scene__station-label">ヒモがいる駅</span>
              <span class="route-scene__station-name" id="fromStationTag">読込中…</span>
            </div>

            <div class="route-scene__station-tag route-scene__station-tag--right">
              <span class="route-scene__station-label">あなたがいる駅</span>
              <span class="route-scene__station-name" id="toStationTag">読込中…</span>
            </div>
          </div>
        </section>

        <section class="summary" aria-label="駅と交通費情報">
          <div class="fare-pill-wrap">
            <div class="fare-pill">
              <span class="fare-pill__small">往復交通費</span>
              <span class="fare-pill__amount" id="roundTripFare">¥--</span>
            </div>
          </div>
        </section>

        <div class="status-mini" id="statusMini">位置情報の利用とLINEログイン確認後に、最寄り駅と往復交通費を表示します。</div>

        <section class="actions">
          <button id="callButton" class="cta" type="button" disabled>
            <span class="paypay-icon">H</span>
            <span id="callButtonLabel">計算中…</span>
          </button>

          <div class="footer-note" id="footerNote">※まだ確定はしません。ヒモが気づいたらすぐ連絡します。</div>

          <div class="secondary-actions">
            <button type="button" class="subbtn" id="reloadBtn">現在地再取得</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const CONFIG = {
        logoImage: window.HIMOTY_LOGO_IMAGE || './himoty_logo.jpg',
        routeMascotImage: window.HIMOTY_ROUTE_MASCOT_IMAGE || './himoty_train.jpg',
        himoStationApiUrl: window.HIMOTY_STATION_API_URL || '/api/himo/station',
        nearestStationApiUrl: window.HIMOTY_NEAREST_STATION_API_URL || '/api/google/nearest-station',
        fareApiUrl: window.HIMOTY_FARE_API_URL || '/api/yahoo/roundtrip-fare',
        callRequestApiUrl: window.HIMOTY_CALL_REQUEST_API_URL || '/api/himo/call-request',
        footerNote: window.HIMOTY_FOOTER_NOTE || '※まだ確定はしません。ヒモが気づいたらすぐ連絡します。',
        liffId: window.HIMOTY_LIFF_ID || '',
        fetchTimeoutMs: Number(window.HIMOTY_FETCH_TIMEOUT_MS || 12000),
        geoTimeoutMs: Number(window.HIMOTY_GEO_TIMEOUT_MS || 12000),
        fallbackFromStation: window.HIMOTY_FROM_STATION || '渋谷駅'
      };

      const refs = {
        appRoot: document.getElementById('appRoot'),
        brandLogo: document.getElementById('brandLogo'),
        routeMascot: document.getElementById('routeMascot'),
        fromStationTag: document.getElementById('fromStationTag'),
        toStationTag: document.getElementById('toStationTag'),
        roundTripFare: document.getElementById('roundTripFare'),
        statusMini: document.getElementById('statusMini'),
        callButton: document.getElementById('callButton'),
        callButtonLabel: document.getElementById('callButtonLabel'),
        reloadBtn: document.getElementById('reloadBtn'),
        footerNote: document.getElementById('footerNote'),
        errorBox: document.getElementById('errorBox'),
        successBox: document.getElementById('successBox')
      };

      let latestRoundTripFare = null;
      let latestHimoStationName = CONFIG.fallbackFromStation;
      let latestUserStationName = '';
      let requesterDisplayName = '';
      let requesterLineUserId = '';
      let isLoading = false;

      function formatYen(value) {
        return new Intl.NumberFormat('ja-JP', {
          style: 'currency',
          currency: 'JPY',
          maximumFractionDigits: 0
        }).format(Number(value || 0));
      }

      function formatAmountYenText(value) {
        return new Intl.NumberFormat('ja-JP', {
          maximumFractionDigits: 0
        }).format(Number(value || 0)) + '円';
      }

      function formatDateTimeJP(date) {
        const value = date instanceof Date ? date : new Date(date);
        const month = value.getMonth() + 1;
        const day = value.getDate();
        const hours = String(value.getHours()).padStart(2, '0');
        const minutes = String(value.getMinutes()).padStart(2, '0');
        return month + '月' + day + '日 ' + hours + '時' + minutes + '分';
      }

      function canSubmit() {
        return Boolean(!isLoading && latestRoundTripFare && requesterLineUserId && requesterDisplayName);
      }

      function refreshCallButtonState() {
        refs.callButton.disabled = !canSubmit();
        if (isLoading) {
          refs.callButtonLabel.textContent = '計算中…';
          return;
        }
        refs.callButtonLabel.textContent = 'ヒモを呼ぶ';
      }

      function setLoading(flag) {
        isLoading = flag;
        refs.appRoot.classList.toggle('is-loading', flag);
        refs.reloadBtn.disabled = flag;
        refreshCallButtonState();
      }

      function setStatus(text) {
        refs.statusMini.textContent = text;
      }

      function showError(text) {
        if (!text) {
          refs.errorBox.style.display = 'none';
          refs.errorBox.textContent = '';
          return;
        }
        refs.errorBox.style.display = 'block';
        refs.errorBox.textContent = text;
      }

      function showSuccess(text) {
        if (!text) {
          refs.successBox.style.display = 'none';
          refs.successBox.textContent = '';
          return;
        }
        refs.successBox.style.display = 'block';
        refs.successBox.textContent = text;
      }

      async function fetchJson(url, options, timeoutMs) {
        if (!url) throw new Error('API URL が未設定です。');

        const controller = new AbortController();
        const timer = setTimeout(function () {
          controller.abort();
        }, timeoutMs || CONFIG.fetchTimeoutMs);

        try {
          const response = await fetch(url, {
            ...(options || {}),
            signal: controller.signal
          });
          const text = await response.text();
          let data;

          try {
            data = text ? JSON.parse(text) : {};
          } catch (error) {
            if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
              throw new Error('APIの代わりにHTMLが返っています。サーバー側のルーティング確認が必要です。');
            }
            throw new Error('APIレスポンスをJSONとして読めませんでした。');
          }

          if (!response.ok) {
            throw new Error(data.detail || data.error || ('HTTP ' + response.status));
          }
          return data;
        } catch (error) {
          if (error.name === 'AbortError') {
            throw new Error('APIの応答が遅いためタイムアウトしました。');
          }
          throw error;
        } finally {
          clearTimeout(timer);
        }
      }

      function getCurrentPositionSafe() {
        return new Promise(function (resolve, reject) {
          if (!navigator.geolocation) {
            reject(new Error('このブラウザでは位置情報が使えません。'));
            return;
          }

          let settled = false;
          const timer = setTimeout(function () {
            if (settled) return;
            settled = true;
            reject(new Error('位置情報の許可待ちが長いため中断しました。ブラウザで位置情報を許可して再読み込みしてください。'));
          }, CONFIG.geoTimeoutMs);

          navigator.geolocation.getCurrentPosition(
            function (position) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              resolve(position);
            },
            function (error) {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              if (error && error.code === error.PERMISSION_DENIED) {
                reject(new Error('位置情報が許可されていません。ブラウザで位置情報を許可してください。'));
                return;
              }
              if (error && error.code === error.TIMEOUT) {
                reject(new Error('位置情報の取得がタイムアウトしました。もう一度お試しください。'));
                return;
              }
              reject(new Error('位置情報を取得できませんでした。'));
            },
            {
              enableHighAccuracy: true,
              timeout: CONFIG.geoTimeoutMs,
              maximumAge: 0
            }
          );
        });
      }

      async function initLiffProfile() {
        if (!window.liff) {
          throw new Error('LIFF SDK の読込に失敗しました。');
        }

        if (!CONFIG.liffId) {
          throw new Error('LIFF ID が未設定です。');
        }

        try {
          await window.liff.init({
            liffId: CONFIG.liffId
          });
        } catch (error) {
          const code = error && error.code ? ` [${error.code}]` : '';
          throw new Error(`LIFF初期化に失敗しました${code}: ${error.message || 'unknown error'}`);
        }

        if (!window.liff.isLoggedIn()) {
          window.liff.login({
            redirectUri: window.location.href
          });
          return false;
        }

        let profile;
        try {
          profile = await window.liff.getProfile();
        } catch (error) {
          const code = error && error.code ? ` [${error.code}]` : '';
          throw new Error(`LINEプロフィール取得に失敗しました${code}: ${error.message || 'unknown error'}`);
        }

        requesterDisplayName = profile && profile.displayName ? profile.displayName : '';
        requesterLineUserId = profile && profile.userId ? profile.userId : '';

        if (!requesterDisplayName || !requesterLineUserId) {
          throw new Error('LINEプロフィールが空です。displayName または userId を取得できませんでした。');
        }

        return true;
      }

      function normalizeHimoStation(payload) {
        const root = payload && typeof payload === 'object' ? payload : {};
        const station = root.station && typeof root.station === 'object' ? root.station : root;
        return {
          stationName: station.stationName || station.name || CONFIG.fallbackFromStation
        };
      }

      function normalizeNearestStation(payload) {
        const root = payload && typeof payload === 'object' ? payload : {};
        const station = root.station && typeof root.station === 'object' ? root.station : root;
        return {
          name: station.name || station.stationName || ''
        };
      }

      function normalizeFare(payload) {
        const root = payload && typeof payload === 'object' ? payload : {};
        return {
          roundTripFare: Number(root.roundTripFare || root.totalFare || 0) || 0
        };
      }

      function renderBase() {
        refs.brandLogo.src = CONFIG.logoImage;
        refs.routeMascot.src = CONFIG.routeMascotImage;
        refs.footerNote.textContent = CONFIG.footerNote;
      }

      function renderHimoStation(himo) {
        latestHimoStationName = himo.stationName || CONFIG.fallbackFromStation;
        refs.fromStationTag.textContent = latestHimoStationName;
      }

      function renderNearestStation(nearest) {
        latestUserStationName = nearest.name || '';
        refs.toStationTag.textContent = nearest.name || '取得失敗';
      }

      function renderFare(fare, nearestName, himoName) {
        latestRoundTripFare = fare.roundTripFare || null;
        refs.roundTripFare.textContent = formatYen(fare.roundTripFare);
        setStatus(nearestName + ' から ' + himoName + ' までの往復交通費です。');
        refreshCallButtonState();
      }

      function resetForLoading() {
        latestRoundTripFare = null;
        latestUserStationName = '';
        latestHimoStationName = CONFIG.fallbackFromStation;
        refs.roundTripFare.textContent = '¥--';
        refs.fromStationTag.textContent = '読込中…';
        refs.toStationTag.textContent = '読込中…';
        setStatus('位置情報の利用とLINEログイン確認後に、最寄り駅と往復交通費を表示します。');
        refreshCallButtonState();
      }

      async function init() {
        if (isLoading) return;
        renderBase();
        resetForLoading();
        setLoading(true);
        showError('');
        showSuccess('');

        try {
          setStatus('LINEログインを確認しています。');

          const liffReady = await initLiffProfile();

          if (!liffReady) {
            setStatus('LINEログインへ移動しています…');
            return;
          }

          setStatus('ヒモの駅を取得しています。');
          const himoPayload = await fetchJson(CONFIG.himoStationApiUrl);
          const himo = normalizeHimoStation(himoPayload);
          renderHimoStation(himo);

          setStatus('現在地を取得しています。');
          const position = await getCurrentPositionSafe();

          setStatus('あなたの最寄り駅を検索しています。');
          const nearestPayload = await fetchJson(CONFIG.nearestStationApiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude
            })
          });

          const nearest = normalizeNearestStation(nearestPayload);
          renderNearestStation(nearest);

          if (!nearest.name || !himo.stationName) {
            throw new Error('駅名が不足しているため電車賃を計算できませんでした。');
          }

          setStatus('往復交通費を計算しています。');
          const farePayload = await fetchJson(CONFIG.fareApiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              from: nearest.name,
              to: himo.stationName
            })
          });

          const fare = normalizeFare(farePayload);

          if (!fare.roundTripFare) {
            throw new Error('往復交通費を取得できませんでした。');
          }

          renderFare(fare, nearest.name, himo.stationName);
          setStatus('準備ができました。ヒモを呼べます。');
        } catch (error) {
          console.error(error);
          showError(error.message || '読込に失敗しました。');
          setStatus('読込に失敗しました。LIFF設定・位置情報・API応答を確認してください。');
        } finally {
          setLoading(false);
          refreshCallButtonState();
        }
      }

      async function submitCallRequest() {
        if (!canSubmit()) {
          setStatus('LINEプロフィール・駅・交通費の取得完了を待ってください。');
          return;
        }

        showError('');
        showSuccess('');
        refs.callButton.disabled = true;
        refs.callButtonLabel.textContent = '送信中…';

        try {
          const now = new Date();
          const requestedAtLabel = formatDateTimeJP(now);
          const payload = {
            requestedAt: now.toISOString(),
            requestedAtLabel: requestedAtLabel,
            himoStation: latestHimoStationName,
            userStation: latestUserStationName,
            roundTripFare: Number(latestRoundTripFare),
            requesterDisplayName: requesterDisplayName,
            requesterLineUserId: requesterLineUserId,
            source: 'fare-paypay-guide'
          };

          const result = await fetchJson(CONFIG.callRequestApiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          refs.callButtonLabel.textContent = '送信しました';
          setStatus('予約者本人と星野さんのLINEに通知を送りました。');
          showSuccess((result && result.message) || 'LINE通知を送信しました。');
        } catch (error) {
          console.error(error);
          showError(error.message || '呼び出し送信に失敗しました。');
          setStatus('呼び出し送信に失敗しました。API設定を確認してください。');
          refs.callButtonLabel.textContent = 'ヒモを呼ぶ';
          refreshCallButtonState();
        }
      }

      refs.reloadBtn.addEventListener('click', init);
      refs.callButton.addEventListener('click', submitCallRequest);

      renderBase();
      init();
    })();
  </script>
</body>
</html>
