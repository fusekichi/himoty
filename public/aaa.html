<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ヒモティー | いまのヒモ状況</title>
  <meta name="theme-color" content="#f7fbf5" />
  <style>
    :root {
      --bg-1: #f7fbf5;
      --bg-2: #ffffff;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #111111;
      --muted: #61685d;
      --green-strong: #70d45b;
      --green-soft: #dbe9a4;
      --green-soft-2: #d1e28c;
      --green-outline: #63c658;
      --line: #dfe8d8;
      --shadow-soft: 0 12px 32px rgba(108, 140, 95, 0.14);
      --shadow-card: 0 14px 32px rgba(197, 210, 108, 0.22);
      --radius-app: 34px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --max-width: 430px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at 8% 14%, rgba(214, 240, 198, 0.62), transparent 22%),
        radial-gradient(circle at 88% 90%, rgba(223, 240, 212, 0.68), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      padding: 18px 14px 0;
    }

    .miniapp-label {
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(100%, var(--max-width));
      margin: 0 auto 10px;
      color: #5a6657;
      font-size: 14px;
      font-weight: 600;
    }

    .miniapp-label__badge {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: #06c755;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .app {
      width: 100%;
      max-width: var(--max-width);
      min-height: calc(100vh - 34px);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid rgba(223, 231, 219, 0.92);
      border-radius: var(--radius-app);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 18px 10px 1px;
      background: rgba(255, 255, 255, 0.98);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand__logo {
      width: 100px;
      object-fit: contain;
      display: block;
    }

    .brand__title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .content {
      padding: 6px 22px 24px;
      text-align: center;
    }

    .hero {
      margin-top: 10px;
    }

    .hero__image {
      width: min(240px, 78%);
      max-width: 140px;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }

    .headline {
      margin: 18px 0 18px;
      font-size: clamp(26px, 8vw, 34px);
      line-height: 1.16;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .status-card {
      background: linear-gradient(180deg, var(--green-soft) 0%, var(--green-soft-2) 100%);
      border-radius: var(--radius-card);
      padding: 24px 18px 20px;
      box-shadow: var(--shadow-card);
      margin-bottom: 18px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .status-card--loading,
    .status-card--error {
      background: linear-gradient(180deg, #eef5e7 0%, #e7f0de 100%);
    }

    .status-card__icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2b2b2b;
    }

    .status-card__title {
      margin: 0 0 6px;
      font-size: clamp(24px, 7vw, 32px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .status-card__text {
      margin: 0;
      font-size: 15px;
      line-height: 1.75;
      color: #283124;
      font-weight: 600;
      white-space: pre-line;
    }

    .actions {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .btn {
      appearance: none;
      width: 100%;
      min-height: 62px;
      border-radius: var(--radius-pill);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease, opacity 0.14s ease;
    }

    .btn:active { transform: translateY(1px); }

    .btn--filled {
      border: 0;
      background: linear-gradient(180deg, #86dc69 0%, var(--green-strong) 100%);
      color: #111;
      box-shadow: 0 8px 18px rgba(110, 201, 91, 0.24);
    }

    .btn--outline {
      border: 2px solid var(--green-outline);
      background: #fff;
      color: #111;
    }

    .btn--ghost {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      color: #111;
      font-size: 16px;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      margin: 18px auto 0;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #edf2ea;
      box-shadow: 0 8px 20px rgba(120, 144, 104, 0.10);
      color: #353d31;
      font-size: 14px;
      font-weight: 700;
    }

    .meta__clock {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #9be67e;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .home-indicator {
      width: 134px;
      height: 5px;
      border-radius: 999px;
      background: #1a1a1a;
      opacity: 0.15;
      margin: 18px auto 10px;
    }

    @media (max-width: 390px) {
      .screen { padding-left: 10px; padding-right: 10px; }
      .content { padding-left: 18px; padding-right: 18px; }
      .brand__title { font-size: 20px; }
      .headline { font-size: 30px; }
      .status-card__title { font-size: 28px; }
      .btn { min-height: 58px; font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <main class="app">
      <header class="header">
        <div class="brand">
          <img class="brand__logo" id="brandLogo" src="/images/himoty-header-icon.png" alt="ヒモティ" />
          <!-- <div class="brand__title">ヒモティー</div> -->
        </div>
      </header>

      <section class="content">
        <div class="hero">
          <img class="hero__image" id="heroImage" src="/images/himoty-free-character.png" alt="ヒモティ" />
        </div>

        <h1 class="headline">いまのヒモ状況</h1>

        <section class="status-card status-card--loading" id="statusCard">
          <div class="status-card__icon" id="statusIcon" aria-hidden="true"></div>
          <h2 class="status-card__title" id="statusTitle">確認中です</h2>
          <p class="status-card__text" id="statusText">いまから2時間の予定と現在地を確認しています</p>
        </section>

        <div class="actions" id="actions"></div>

        <div class="meta">
          <span class="meta__clock">◔</span>
          <span id="metaText">最新更新: --:--</span>
        </div>

        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const CONFIG = {
        callStatusApiUrl: window.HIMOTY_CALL_STATUS_API_URL || '/api/calendar/call-status',
        stationApiUrl: window.HIMOTY_STATION_API_URL || '/api/himo/station',
        logoImage: './himoty_logo.jpg',
        freeHeroImage: './himoty_free.jpg',
        busyHeroImage: './himoty_busy.png',
        callUrl: window.HIMOTY_CALL_URL || '/call.html',
        laterUrl: window.HIMOTY_LATER_URL || '/reserve.html',
        refreshMs: Number(window.HIMOTY_STATUS_REFRESH_MS || 60000)
      };

      const refs = {
        brandLogo: document.getElementById('brandLogo'),
        heroImage: document.getElementById('heroImage'),
        statusCard: document.getElementById('statusCard'),
        statusIcon: document.getElementById('statusIcon'),
        statusTitle: document.getElementById('statusTitle'),
        statusText: document.getElementById('statusText'),
        actions: document.getElementById('actions'),
        metaText: document.getElementById('metaText')
      };

      refs.brandLogo.src = CONFIG.logoImage;

      document.addEventListener('DOMContentLoaded', function () {
        renderWaiting();
        loadStatus();
        if (CONFIG.refreshMs > 0) {
          setInterval(loadStatus, CONFIG.refreshMs);
        }
      });

      async function loadStatus() {
        try {
          renderWaiting();

          const [callStatusResult, stationResult] = await Promise.allSettled([
            fetchJson(CONFIG.callStatusApiUrl),
            fetchJson(CONFIG.stationApiUrl)
          ]);

          if (callStatusResult.status !== 'fulfilled') {
            throw callStatusResult.reason;
          }

          const callStatus = callStatusResult.value;
          const stationData =
            stationResult.status === 'fulfilled'
              ? normalizeStationPayload(stationResult.value)
              : null;

          renderResult(callStatus, stationData);
        } catch (error) {
          console.error('[status] fetch failed:', error);
          renderError(error);
        }
      }

      function renderResult(callStatus, stationData) {
        const canCall = parseCanCall(callStatus.canCall);

        refs.heroImage.src = canCall ? CONFIG.freeHeroImage : CONFIG.busyHeroImage;
        refs.statusCard.className = 'status-card';
        refs.statusIcon.innerHTML = canCall ? getFreeIconSvg() : getBusyIconSvg();
        refs.statusTitle.textContent = canCall ? 'ヒマです' : '取り込み中です';
        refs.statusText.textContent = buildStatusMessage(callStatus, stationData, canCall);
        refs.metaText.textContent =
          '最新更新: ' + formatUpdatedTime(callStatus.checkedAt, stationData?.updatedAt);

        const buttons = canCall
          ? [
              { label: 'すぐにヒモを呼ぶ', className: 'btn btn--filled', href: CONFIG.callUrl },
              { label: 'あとでヒモを呼ぶ', className: 'btn btn--outline', href: CONFIG.laterUrl }
            ]
          : [
              { label: 'あとでヒモを呼ぶ', className: 'btn btn--outline', href: CONFIG.laterUrl }
            ];

        renderButtons(buttons);
      }

      function renderWaiting() {
        refs.heroImage.src = CONFIG.freeHeroImage;
        refs.statusCard.className = 'status-card status-card--loading';
        refs.statusIcon.innerHTML = getLoadingIconSvg();
        refs.statusTitle.textContent = '確認中です';
        refs.statusText.textContent = 'いまから2時間の予定と現在地を確認しています';
        refs.metaText.textContent = '最新更新: --:--';
        renderButtons([
          { label: 'もう一度チェックする', className: 'btn btn--ghost', onClick: loadStatus }
        ]);
      }

      function renderError(error) {
        refs.heroImage.src = CONFIG.busyHeroImage;
        refs.statusCard.className = 'status-card status-card--error';
        refs.statusIcon.innerHTML = getErrorIconSvg();
        refs.statusTitle.textContent = '確認できませんでした';
        refs.statusText.textContent = error?.message || 'APIの設定を確認してください。';
        refs.metaText.textContent = '最新更新: --:--';
        renderButtons([
          { label: 'もう一度チェックする', className: 'btn btn--ghost', onClick: loadStatus },
          { label: 'あとでヒモを呼ぶ', className: 'btn btn--outline', href: CONFIG.laterUrl }
        ]);
      }

      function buildStatusMessage(callStatus, stationData, canCall) {
        const lines = [];

        const stationLine = buildStationLine(stationData?.station);
        if (stationLine) {
          lines.push(stationLine);
        }

        if (!canCall) {
          const nextAvailableLabel = String(callStatus?.nextAvailableLabel || '').trim();

          if (nextAvailableLabel) {
            lines.push(nextAvailableLabel);
          } else {
            const availableLine = buildAvailableFromLine(stationData?.availableFrom);
            if (availableLine) {
              lines.push(availableLine);
            }
          }
        }

        if (lines.length === 0) {
          const fallback = String(callStatus?.message || '').trim();
          if (fallback) return fallback;
          return canCall ? 'いまならヒモを呼べます' : 'いまはヒモを呼べません';
        }

        return lines.join('\n');
      }

      function buildStationLine(station) {
        const text = String(station || '').trim();
        if (!text) return '';
        if (text.includes('にいます')) return text;
        if (text.includes('らへん')) return text + 'にいます';
        if (text.includes('駅')) return text + 'らへんにいます';
        return text + 'らへんにいます';
      }

      function buildAvailableFromLine(value) {
        const text = String(value || '').trim();
        if (!text) return '';

        const date = tryParseDate(text);
        if (date) {
          const hh = date.getHours();
          const mm = date.getMinutes();
          if (mm === 0) return '今日は' + hh + '時からヒマです';
          return '今日は' + hh + '時' + String(mm).padStart(2, '0') + '分からヒマです';
        }

        if (/^\d{1,2}:\d{2}$/.test(text)) {
          const [h, m] = text.split(':');
          if (m === '00') return '今日は' + Number(h) + '時からヒマです';
          return '今日は' + Number(h) + '時' + m + '分からヒマです';
        }

        if (/^\d{1,2}時(\d{1,2}分)?$/.test(text)) {
          return '今日は' + text + 'からヒマです';
        }

        return text.includes('ヒマ') ? text : text + 'からヒマです';
      }

      function normalizeStationPayload(payload) {
        const root = payload?.data ?? payload?.current ?? payload?.station ?? payload ?? {};
        return {
          station: pickFirstString([
            root.stationName,
            root.station_name,
            root.station,
            root.currentStation,
            root.current_station,
            root.placeName,
            root.place,
            root.area,
            root.location
          ]),
          availableFrom: pickFirstString([
            root.availableFrom,
            root.available_from,
            root.nextAvailableAt,
            root.next_available_at,
            root.availableAt,
            root.available_at,
            root.freeFrom,
            root.free_from
          ]),
          updatedAt: pickFirstString([
            root.updatedAt,
            root.updated_at,
            root.lastUpdatedAt,
            root.last_updated_at,
            payload?.updatedAt,
            payload?.updated_at
          ])
        };
      }

      function renderButtons(buttons) {
        refs.actions.innerHTML = '';
        buttons.forEach((button) => {
          const el = document.createElement('button');
          el.type = 'button';
          el.className = button.className;
          el.textContent = button.label;
          el.addEventListener('click', function () {
            if (typeof button.onClick === 'function') {
              button.onClick();
              return;
            }
            if (button.href) {
              window.location.href = button.href;
            }
          });
          refs.actions.appendChild(el);
        });
      }

      async function fetchJson(url) {
        const response = await fetch(url, {
          method: 'GET',
          headers: { Accept: 'application/json' },
          credentials: 'same-origin',
          cache: 'no-store'
        });

        const data = await parseApiResponse(response);
        if (!response.ok) {
          throw new Error(data.detail || data.error || 'API呼び出しに失敗しました');
        }
        return data;
      }

      async function parseApiResponse(response) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch {
          if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
            throw new Error('APIの代わりにHTMLが返っています。サーバー再起動後に試してください。');
          }
          throw new Error('APIレスポンスを読めませんでした。');
        }
      }

      function parseCanCall(value) {
        if (value === true || value === 'true' || value === 1 || value === '1') return true;
        if (value === false || value === 'false' || value === 0 || value === '0') return false;
        return false;
      }

      function formatUpdatedTime(primaryValue, secondaryValue) {
        const date = tryParseDate(primaryValue) || tryParseDate(secondaryValue);
        if (!date) return '--:--';
        return date.toLocaleTimeString('ja-JP', {
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      function tryParseDate(value) {
        if (!value) return null;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function pickFirstString(values) {
        for (const value of values) {
          if (typeof value === 'string' && value.trim()) return value.trim();
        }
        return '';
      }

      function getLoadingIconSvg() {
        return `
          <svg width="80" height="80" viewBox="0 0 74 74" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="37" cy="37" r="22" stroke="#2A2A2A" stroke-width="3.5" opacity="0.25"/>
            <path d="M37 15C49.1503 15 59 24.8497 59 37" stroke="#39A93B" stroke-width="5" stroke-linecap="round"/>
          </svg>
        `;
      }

      function getErrorIconSvg() {
        return `
          <svg width="80" height="80" viewBox="0 0 74 74" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="37" cy="37" r="23" stroke="#2A2A2A" stroke-width="3.5"/>
            <path d="M37 24V40" stroke="#2A2A2A" stroke-width="4.5" stroke-linecap="round"/>
            <circle cx="37" cy="49.5" r="2.7" fill="#39A93B" stroke="#2A2A2A" stroke-width="1.8"/>
          </svg>
        `;
      }

      function getFreeIconSvg() {
        return `
          <svg width="80" height="80" viewBox="0 0 74 74" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="34" cy="34" r="21" stroke="#2A2A2A" stroke-width="3.5"/>
            <path d="M24 34.5L31.5 42L46 27.5" stroke="#39A93B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M49.5 44.5C46.5 41.8 41.8 42 39.2 45.1C37.8 46.7 37.1 48.9 37.4 51C37.5 52 38 53.1 38.8 54C41.4 57.2 45.7 58.6 49.5 55.9C53.3 58.6 57.6 57.2 60.2 54C61 53.1 61.5 52 61.6 51C61.9 48.9 61.2 46.7 59.8 45.1C57.2 42 52.5 41.8 49.5 44.5Z" fill="#B9D96D" stroke="#2A2A2A" stroke-width="2.2" stroke-linejoin="round"/>
          </svg>
        `;
      }

      function getBusyIconSvg() {
        return `
          <svg width="80" height="80" viewBox="0 0 74 74" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="14" y="21" width="46" height="28" rx="5" stroke="#2A2A2A" stroke-width="3.5" fill="rgba(255,255,255,0.32)"/>
            <path d="M10 53H64" stroke="#2A2A2A" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M28 31H47" stroke="#39A93B" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M28 38H42" stroke="#39A93B" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="56" cy="19" r="7" fill="#B9D96D" stroke="#2A2A2A" stroke-width="2.4"/>
            <path d="M56 15V19L58.8 21.2" stroke="#2A2A2A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `;
      }
    })();
  </script>
</body>
</html>
